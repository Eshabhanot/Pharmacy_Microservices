server:
  port: 8083
 
spring:
  datasource:
      url: jdbc:mysql://localhost:3306/orderDb
      username: root
      password:

  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
